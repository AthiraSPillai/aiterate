services:
  api:
    image: ghcr.io/athiraspillai/aiterate:${AIT_IMAGE_TAG:-latest}
    environment:
      AIT_ENV: production
      AIT_DATABASE_URL: postgresql+psycopg://aiterate:aiterate@postgres:5432/aiterate
      AIT_SECRET_KEY: ${AIT_SECRET_KEY:-}
      AIT_AUTO_GENERATE_SECRET_KEY: ${AIT_AUTO_GENERATE_SECRET_KEY:-true}
      AIT_CORS_ORIGINS: http://localhost:8000,http://127.0.0.1:8000
      AIT_ENABLE_LOCAL_GIT: ${AIT_ENABLE_LOCAL_GIT:-false}
      AIT_GIT_AUTHOR_NAME: ${AIT_GIT_AUTHOR_NAME:-AIterate Bot}
      AIT_GIT_AUTHOR_EMAIL: ${AIT_GIT_AUTHOR_EMAIL:-bot@aiterate.dev}
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8000:8000"
    volumes:
      - aiterate-data:/app/.aiterate
    depends_on:
      - postgres
      - redis
      - mlflow

  worker:
    image: ghcr.io/athiraspillai/aiterate:${AIT_IMAGE_TAG:-latest}
    command: python -m aiterate.worker
    environment:
      AIT_ENV: production
      AIT_DATABASE_URL: postgresql+psycopg://aiterate:aiterate@postgres:5432/aiterate
      AIT_SECRET_KEY: ${AIT_SECRET_KEY:-}
      AIT_AUTO_GENERATE_SECRET_KEY: ${AIT_AUTO_GENERATE_SECRET_KEY:-true}
      AIT_ENABLE_LOCAL_GIT: ${AIT_ENABLE_LOCAL_GIT:-false}
      AIT_GIT_AUTHOR_NAME: ${AIT_GIT_AUTHOR_NAME:-AIterate Bot}
      AIT_GIT_AUTHOR_EMAIL: ${AIT_GIT_AUTHOR_EMAIL:-bot@aiterate.dev}
    volumes:
      - aiterate-data:/app/.aiterate
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: aiterate
      POSTGRES_USER: aiterate
      POSTGRES_PASSWORD: aiterate
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.15.1
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-data:/mlflow

volumes:
  aiterate-data:
  postgres-data:
  mlflow-data:
